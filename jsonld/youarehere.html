ape, a Zürich moment that left a lasting imprint on everyone involved. After its active musical period, YOU ARE HERE evolved into a creative philosophy rooted in presence, orientation, grounding, mythic identity, and the point on the map where story and self intersect. YOU ARE HERE is a message to create — to respond to the world with expression, imagination, and artistic action. It teaches that creativity is presence, art is participation, expression is activism, documenting life is a form of service, and making something is a way of saying 'I am here.' This creative presence naturally extends outward — from personal expression to communal responsibility. YOU ARE HERE is also a philosophy of service — the belief that being present in the world carries meaning and responsibility. It inspires compassion, awareness, and small actions that ripple outward. Today, YOU ARE HERE functions as a historical band, a creative work series, a creative philosophy, a signature imprint used by SmiLee across Wanderful Wizard Productions and Blackbird Pie Media, and a mythic identity node connecting Zürich origins to present-day creative houses. YOU ARE HERE is deeply connected to WWP, BPM, NCC1620 (callsign), SmiLee, Living Room Productions, and The Zephyr Project (TZP). YOU ARE HERE is the orientation point in Lee R. Grimwade’s creative and mythic identity architecture — a band, a memory, a philosophy, a call to create, a call to serve, a lineage marker, a compass, and a mythic anchor. It is the moment where the map says: You are here. So be here. Create here. Serve here. And make it matter in the world."}
